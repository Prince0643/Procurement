services:
  db:
    image: mariadb:10.4
    container_name: procurement_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in /opt/procurement/.env.prod}
      MYSQL_DATABASE: procurement_db
      MYSQL_USER: ${MYSQL_USER:-procurement_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in /opt/procurement/.env.prod}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/00_init_db.sql:/docker-entrypoint-initdb.d/00_init_db.sql:ro
      - ./dbschema/procurement_db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    # Do not expose DB publicly; keep internal-only.
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: procurement_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: procurement_db
      DB_USER: ${MYSQL_USER:-procurement_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?set in /opt/procurement/.env.prod}
      JWT_SECRET: ${JWT_SECRET:?set in /opt/procurement/.env.prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ATTENDANCE_SYNC_API_KEY: ${ATTENDANCE_SYNC_API_KEY:-}
      ATTENDANCE_API_URL: ${ATTENDANCE_API_URL:-}
      ATTENDANCE_API_KEY: ${ATTENDANCE_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://procurement.xandree.com}
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://procurement-api.xandree.com/api}
    container_name: procurement_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: procurement_adminer
    restart: unless-stopped
    profiles: ["adminer"]
    ports:
      - "127.0.0.1:8082:8080"
    depends_on:
      - db

volumes:
  db_data:
  backend_uploads:
